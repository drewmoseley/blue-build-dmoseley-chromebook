---
name: validate

"on":
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Repo
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck systemd
          python3 -m pip install --user yamllint

      - name: Validate shell scripts and systemd units
        run: ./scripts/validate.sh

      - name: Lint YAML
        run: ~/.local/bin/yamllint .github/workflows recipes/recipe.yml
